version: 2

models:
  - name: silver_daily_bars
    description: "Cleaned and deduped OHLCV bars from bronze_raw."
    columns:
      - name: ticker
        tests:
          - not_null
      - name: bar_date
        tests:
          - not_null
      - name: open
        tests:
          - not_null
      - name: high
        tests:
          - not_null
      - name: low
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: volume
        tests:
          - not_null
    tests:
      - unique:
          column_name: "ticker || '|' || bar_date::text"
